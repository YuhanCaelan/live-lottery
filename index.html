<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>晚会大屏幕随机抽奖</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .photo-mode-toggle {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .photo-mode-toggle:checked ~ .top-actions,
    .photo-mode-toggle:checked ~ .controls,
    .photo-mode-toggle:checked ~ .round-badge,
    .photo-mode-toggle:checked ~ .show-results-btn,
    .photo-mode-toggle:checked ~ .settings-panel {
      display: none !important;
    }

    .photo-mode-toggle:checked ~ .hero .round-badge {
      display: none !important;
    }

    .stage {
      background:
        radial-gradient(circle at 50% 44%, rgba(100, 234, 255, 0.18), transparent 28%),
        radial-gradient(circle at 16% 18%, rgba(255, 211, 106, 0.12), transparent 22%),
        radial-gradient(circle at 84% 18%, rgba(255, 140, 34, 0.1), transparent 20%),
        linear-gradient(145deg, #041025 0%, #081d45 46%, #030814 100%);
    }

    .top-actions {
      display: flex;
      gap: 10px;
      z-index: 12;
    }

    .small-toggle {
      min-width: 92px;
      min-height: 40px;
      padding: 0 18px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      color: #ecfbff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: rgba(6, 17, 40, 0.55);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
    }

    .photo-mode-btn {
      color: #08213f;
      background: linear-gradient(180deg, #fff1b8, #ffc14d 62%, #f08b17);
      border-color: rgba(255, 211, 106, 0.42);
      box-shadow: 0 0 24px rgba(255, 180, 58, 0.38);
      cursor: pointer;
      user-select: none;
    }

    .stage.is-photo-mode .top-actions,
    .stage.is-photo-mode .controls,
    .stage.is-photo-mode .round-badge,
    .stage.is-photo-mode .show-results-btn,
    .stage.is-photo-mode .settings-panel {
      display: none !important;
    }
  </style>
</head>
<body>
  <main class="stage" id="stage">
    <input class="photo-mode-toggle" id="photoModeToggle" type="checkbox" aria-hidden="true">
    <canvas id="particleCanvas" class="canvas-layer" aria-hidden="true"></canvas>
    <canvas id="fireworkCanvas" class="canvas-layer" aria-hidden="true"></canvas>

    <div class="grid-overlay" aria-hidden="true"></div>
    <div class="top-actions">
      <button class="small-toggle" id="settingsToggle" type="button">设置</button>
      <button class="small-toggle photo-mode-btn" id="photoModeBtn" type="button">合影模式</button>
      <button class="small-toggle music-toggle" id="musicToggle" type="button" aria-label="音乐开关">音乐 ON</button>
    </div>

    <section class="hero" aria-live="polite">
      <div class="round-badge" id="roundBadge">准备抽奖</div>

      <div class="halo" id="halo">
        <div class="halo-ring halo-ring-a"></div>
        <div class="halo-ring halo-ring-b"></div>
        <div class="halo-core">
          <div class="intro-text" id="introText">今天,你就是C位</div>
          <div class="rolling-number" id="rollingNumber">15排:20</div>
        </div>
      </div>

      <div class="winner-panel" id="winnerPanel">
        <div class="winner-label" id="winnerLabel">第一轮中奖结果</div>
        <div class="winner-number" id="winnerNumber">--</div>
      </div>

      <div class="result-list" id="resultList">
        <div class="result-title">两轮中奖结果</div>
        <div class="result-items" id="resultItems"></div>
      </div>
    </section>

    <div class="flying-layer" id="flyingLayer" aria-hidden="true"></div>

    <button class="show-results-btn" id="showResultsBtn" type="button">显示全部抽奖结果</button>

    <section class="controls" aria-label="抽奖操作">
      <button class="primary-btn" id="startBtn" type="button">开始抽奖</button>
      <button class="primary-btn stop-btn" id="stopBtn" type="button" disabled>停止抽奖</button>
      <button class="ghost-btn" id="resetBtn" type="button">重置抽奖</button>
    </section>

    <section class="settings-panel" id="settingsPanel" aria-label="抽奖设置" aria-hidden="true">
      <div class="settings-shell">
        <header class="settings-header">
          <div>
            <div class="settings-kicker">抽奖设置</div>
            <h1>不参与座位与抽奖轮次</h1>
          </div>
          <button class="icon-close" id="settingsClose" type="button" aria-label="关闭设置">×</button>
        </header>

        <div class="settings-body">
          <aside class="settings-sidebar">
            <div class="setting-group">
              <label for="roundsInput">抽奖轮数</label>
              <input id="roundsInput" type="number" min="1" max="99" step="1" value="2">
            </div>
            <div class="setting-group">
              <label for="perRoundInput">每轮人数</label>
              <input id="perRoundInput" type="number" min="1" max="99" step="1" value="1">
            </div>
            <div class="setting-group">
              <label for="introTextInput">抽奖页标语</label>
              <input id="introTextInput" type="text" maxlength="24" value="今天,你是C位">
            </div>
            <div class="setting-group">
              <label for="introHighlightInput">突出文字</label>
              <input id="introHighlightInput" type="text" maxlength="12" placeholder="如 C位">
            </div>
            <div class="setting-group">
              <label for="introHighlightScaleInput">突出倍数</label>
              <input id="introHighlightScaleInput" type="number" min="1" max="4" step="0.1" value="1.8">
            </div>
            <label class="setting-check">
              <input id="secondFloorInput" type="checkbox" checked>
              <span>启用二层座位</span>
            </label>

            <div class="media-settings">
              <div class="quick-title">舞台媒体</div>
              <label class="file-pick-btn" id="backgroundPickBtn">
                <input id="backgroundInput" type="file" accept="image/*">
                <span id="backgroundPickText">选择背景图片</span>
              </label>
              <div class="media-name" id="backgroundName">默认背景</div>
              <label class="file-pick-btn" id="bgmPickBtn">
                <input id="bgmInput" type="file" accept="audio/*">
                <span id="bgmPickText">选择 BGM</span>
              </label>
              <div class="media-name" id="bgmName">内置音乐</div>
              <button class="range-apply-btn" id="clearMediaBtn" type="button">恢复默认媒体</button>
            </div>

            <div class="quick-exclude">
              <div class="quick-title">快速排除</div>
              <select id="rangeLevelInput" aria-label="快速排除区域">
                <option value="一层">一层</option>
                <option value="二层">二层</option>
              </select>
              <div class="range-inputs">
                <label><span>起始排</span><input id="rangeStartRowInput" type="number" min="1" max="99" placeholder="如 16"></label>
                <label><span>结束排</span><input id="rangeEndRowInput" type="number" min="1" max="99" placeholder="如 17"></label>
                <label><span>起始列</span><input id="rangeStartColInput" type="number" min="1" max="42" placeholder="如 16"></label>
                <label><span>结束列</span><input id="rangeEndColInput" type="number" min="1" max="42" placeholder="如 17"></label>
              </div>
              <button class="range-apply-btn" id="rangeExcludeBtn" type="button">排除范围</button>
            </div>

            <div class="seat-stats">
              <div><span>总座位</span><strong id="totalSeatCount">0</strong></div>
              <div><span>不参与</span><strong id="blockedSeatCount">0</strong></div>
              <div><span>参与抽奖</span><strong id="activeSeatCount">0</strong></div>
            </div>

            <button class="reset-mode-btn" id="defaultModeBtn" type="button">恢复默认抽奖模式</button>
          </aside>

          <div class="seat-board-wrap">
            <div class="screen-label">主 席 台</div>
            <div class="seat-legend">
              <span><i class="legend-seat is-active"></i>参与</span>
              <span><i class="legend-seat is-blocked"></i>不参与</span>
              <span><i class="legend-seat is-winner"></i>已中奖</span>
            </div>
            <div class="seat-map" id="seatMap" aria-label="座位图"></div>
          </div>
        </div>
      </div>
    </section>

    <div class="toast" id="toast" role="status"></div>
  </main>

  <audio id="bgm" preload="auto" loop></audio>
  <script>
    (function () {
      const stage = document.getElementById('stage');
      const toggle = document.getElementById('photoModeToggle');
      const button = document.getElementById('photoModeBtn');
      if (!stage || !toggle || !button) return;

      function enterPhotoMode() {
        toggle.checked = true;
        stage.classList.add('is-photo-mode');
        button.hidden = true;
      }

      button.addEventListener('click', enterPhotoMode, { once: true });
      toggle.addEventListener('change', () => {
        if (toggle.checked) {
          stage.classList.add('is-photo-mode');
          button.hidden = true;
        }
      });
      window.__enterPhotoMode = enterPhotoMode;
    }());
  </script>
  <script src="script.js"></script>
</body>
</html>
